<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arroyo TEC Gateway</title>
<style>
  :root {
    --bg:           #0c0e11;
    --bg-card:      #14171c;
    --bg-card-hover:#191d24;
    --bg-detail:    #181c22;
    --border:       #262b33;
    --border-light: #333a45;
    --text:         #d4d8de;
    --text-dim:     #7a8290;
    --text-bright:  #eef0f3;
    --accent:       #3b82f6;
    --accent-dim:   #1e3a5f;
    --green:        #22c55e;
    --green-dim:    #16532e;
    --amber:        #f59e0b;
    --amber-dim:    #5c3d0a;
    --red:          #ef4444;
    --red-dim:      #5c1a1a;
    --grey:         #555d6b;
    --grey-dim:     #2a2e35;
    --mono:         'Menlo', 'Consolas', 'Monaco', 'Liberation Mono', monospace;
    --sans:         system-ui, -apple-system, 'Segoe UI', sans-serif;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: var(--sans); background: var(--bg); color: var(--text); min-height: 100vh; -webkit-font-smoothing: antialiased; }

  /* ── Header ─────────────────────────────────────────── */
  .header { display: flex; align-items: center; justify-content: space-between; padding: 16px 24px; border-bottom: 1px solid var(--border); background: var(--bg); position: sticky; top: 0; z-index: 100; }
  .header-title { font-family: var(--mono); font-size: 15px; font-weight: 700; letter-spacing: 0.08em; color: var(--text-bright); text-transform: uppercase; }
  .header-status { display: flex; align-items: center; gap: 16px; font-size: 13px; color: var(--text-dim); }
  .connection-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); display: inline-block; margin-right: 4px; animation: pulse-dot 2s ease-in-out infinite; }
  .connection-dot.degraded { background: var(--amber); }
  .connection-dot.disconnected { background: var(--red); animation: none; }
  @keyframes pulse-dot { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

  /* ── Lock banner ────────────────────────────────────── */
  .lock-banner { padding: 10px 24px; font-family: var(--mono); font-size: 12px; letter-spacing: 0.05em; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
  .lock-banner.daq { background: #111418; color: var(--text-dim); }
  .lock-banner.locked { background: var(--accent-dim); color: var(--accent); }
  .lock-banner .lock-actions { display: flex; gap: 8px; }
  .lock-btn { font-family: var(--mono); font-size: 11px; padding: 4px 12px; border-radius: 4px; border: 1px solid; cursor: pointer; letter-spacing: 0.04em; transition: all 0.15s; }
  .lock-btn.acquire { background: var(--accent-dim); color: var(--accent); border-color: var(--accent); }
  .lock-btn.acquire:hover { background: var(--accent); color: #fff; }
  .lock-btn.release { background: transparent; color: var(--text-dim); border-color: var(--border-light); }
  .lock-btn.release:hover { background: var(--red-dim); color: var(--red); border-color: var(--red); }
  .lock-btn.extend { background: transparent; color: var(--text-dim); border-color: var(--border-light); }
  .lock-btn.extend:hover { background: var(--accent-dim); color: var(--accent); }
  .advisory-warning { font-size: 10px; color: var(--amber); margin-left: 8px; }

  /* ── Device group ───────────────────────────────────── */
  .devices-container { padding: 20px 24px 40px; }
  .device-group { margin-bottom: 24px; border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
  .device-header { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; background: #111418; border-bottom: 1px solid var(--border); font-size: 13px; }
  .device-name { font-family: var(--mono); font-weight: 600; color: var(--text-bright); font-size: 14px; }
  .device-meta { color: var(--text-dim); font-family: var(--mono); font-size: 12px; display: flex; align-items: center; gap: 12px; }
  .channels-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 1px; background: var(--border); }

  /* ── Channel card ───────────────────────────────────── */
  .channel-card { background: var(--bg-card); padding: 16px; cursor: pointer; transition: background 0.15s; position: relative; }
  .channel-card:hover { background: var(--bg-card-hover); }
  .channel-card.alarm { border-left: 3px solid var(--red); }
  .channel-card.disconnected { opacity: 0.45; pointer-events: none; }
  .channel-card.disconnected::after { content: "DISCONNECTED"; position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-family: var(--mono); font-size: 11px; font-weight: 700; letter-spacing: 0.12em; color: var(--text-dim); background: rgba(12,14,17,0.7); }
  .ch-label { font-family: var(--mono); font-size: 11px; font-weight: 600; color: var(--text-dim); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 8px; display: flex; align-items: center; justify-content: space-between; }
  .ch-temp { font-family: var(--mono); font-size: 32px; font-weight: 700; color: var(--text-bright); line-height: 1; margin-bottom: 2px; }
  .ch-temp .unit { font-size: 18px; font-weight: 400; color: var(--text-dim); }
  .ch-setpoint { font-family: var(--mono); font-size: 13px; color: var(--text-dim); margin-bottom: 12px; }
  .ch-readings { display: grid; grid-template-columns: 1fr 1fr; gap: 4px 12px; font-family: var(--mono); font-size: 12px; }
  .ch-readings dt { color: var(--text-dim); }
  .ch-readings dd { color: var(--text); text-align: right; }
  .ch-output-badge { display: inline-flex; align-items: center; gap: 4px; font-family: var(--mono); font-size: 11px; font-weight: 600; letter-spacing: 0.06em; padding: 2px 8px; border-radius: 3px; }
  .ch-output-badge.on { background: var(--green-dim); color: var(--green); }
  .ch-output-badge.off { background: var(--grey-dim); color: var(--grey); }
  .ch-output-badge.alarm-active { background: var(--red-dim); color: var(--red); }
  .ch-output-badge .dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }

  /* ── Detail overlay ─────────────────────────────────── */
  .detail-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 200; display: none; align-items: center; justify-content: center; backdrop-filter: blur(2px); }
  .detail-overlay.open { display: flex; }
  .detail-panel { background: var(--bg-detail); border: 1px solid var(--border); border-radius: 10px; width: 440px; max-width: 95vw; max-height: 90vh; overflow-y: auto; padding: 24px; position: relative; }
  .detail-close { position: absolute; top: 12px; right: 12px; background: none; border: none; color: var(--text-dim); font-size: 20px; cursor: pointer; padding: 4px 8px; border-radius: 4px; }
  .detail-close:hover { background: var(--border); color: var(--text); }
  .detail-title { font-family: var(--mono); font-size: 14px; font-weight: 700; color: var(--text-bright); margin-bottom: 20px; padding-right: 32px; }
  .detail-section { margin-bottom: 20px; }
  .detail-section-title { font-family: var(--mono); font-size: 11px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-dim); margin-bottom: 10px; padding-bottom: 4px; border-bottom: 1px solid var(--border); }
  .detail-row { display: flex; justify-content: space-between; align-items: baseline; padding: 4px 0; font-size: 13px; }
  .detail-row .label { color: var(--text-dim); }
  .detail-row .value { font-family: var(--mono); font-weight: 600; color: var(--text-bright); }

  /* ── Maintenance controls ───────────────────────────── */
  .maint-section { margin-top: 20px; padding: 16px; border: 1px solid var(--accent); border-radius: 6px; background: rgba(59,130,246,0.05); }
  .maint-section.hidden { display: none; }
  .maint-section-title { font-family: var(--mono); font-size: 11px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--accent); margin-bottom: 12px; }
  .maint-row { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
  .maint-row label { font-size: 12px; color: var(--text-dim); min-width: 90px; font-family: var(--mono); }
  .maint-input { font-family: var(--mono); font-size: 13px; background: var(--bg); color: var(--text-bright); border: 1px solid var(--border-light); border-radius: 4px; padding: 4px 8px; width: 90px; }
  .maint-input:focus { outline: none; border-color: var(--accent); }
  .maint-input.error { border-color: var(--red); }
  .maint-unit { font-family: var(--mono); font-size: 12px; color: var(--text-dim); }
  .maint-btn { font-family: var(--mono); font-size: 11px; padding: 5px 14px; border-radius: 4px; border: none; cursor: pointer; letter-spacing: 0.04em; transition: all 0.15s; }
  .maint-btn.apply { background: var(--accent); color: #fff; }
  .maint-btn.apply:hover { background: #2563eb; }
  .maint-btn.on { background: var(--green-dim); color: var(--green); border: 1px solid var(--green); }
  .maint-btn.on:hover { background: var(--green); color: #fff; }
  .maint-btn.off { background: var(--red-dim); color: var(--red); border: 1px solid var(--red); }
  .maint-btn.off:hover { background: var(--red); color: #fff; }
  .maint-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .maint-feedback { font-family: var(--mono); font-size: 11px; margin-top: 8px; padding: 6px 10px; border-radius: 4px; }
  .maint-feedback.ok { background: var(--green-dim); color: var(--green); }
  .maint-feedback.warn { background: var(--amber-dim); color: var(--amber); }
  .maint-feedback.err { background: var(--red-dim); color: var(--red); }

  /* ── Trend chart ────────────────────────────────────── */
  .trend-container { margin: 16px 0; background: #0f1114; border: 1px solid var(--border); border-radius: 6px; padding: 12px; height: 120px; position: relative; }
  .trend-canvas { width: 100%; height: 100%; }
  .trend-label { position: absolute; top: 6px; left: 10px; font-family: var(--mono); font-size: 10px; color: var(--text-dim); letter-spacing: 0.05em; }

  /* ── Footer ─────────────────────────────────────────── */
  .footer-bar { padding: 12px 24px; border-top: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; font-size: 13px; color: var(--text-dim); background: var(--bg); position: sticky; bottom: 0; }
  .footer-bar a { color: var(--accent); text-decoration: none; font-family: var(--mono); font-size: 12px; letter-spacing: 0.04em; }
  .footer-bar a:hover { text-decoration: underline; }
  .cache-age-warning { font-family: var(--mono); font-size: 10px; color: var(--amber); padding: 2px 6px; background: var(--amber-dim); border-radius: 3px; display: none; }
  .cache-age-warning.visible { display: inline-block; }

  /* ── Confirm dialog ─────────────────────────────────── */
  .confirm-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 300; display: none; align-items: center; justify-content: center; }
  .confirm-overlay.open { display: flex; }
  .confirm-box { background: var(--bg-detail); border: 1px solid var(--amber); border-radius: 8px; padding: 24px; max-width: 380px; }
  .confirm-box p { font-size: 13px; margin-bottom: 16px; line-height: 1.5; }
  .confirm-box .btns { display: flex; gap: 8px; justify-content: flex-end; }
</style>
</head>
<body>

<div class="header">
  <div class="header-title">Arroyo TEC Gateway</div>
  <div class="header-status">
    <span><span class="connection-dot" id="globalDot"></span> <span id="globalStatus">Connecting…</span></span>
    <span id="clockDisplay" style="font-family:var(--mono);font-size:12px"></span>
  </div>
</div>

<div class="lock-banner daq" id="lockBanner">
  <div>
    <span id="lockText">◇ Lock: DAQ owns — gateway is read-only</span>
    <span class="advisory-warning" id="advisoryWarn" style="display:none">Advisory lock only — DAQ exclusion is not enforced</span>
  </div>
  <div class="lock-actions" id="lockActions"></div>
</div>

<div class="devices-container" id="devicesContainer"></div>

<div class="footer-bar">
  <span id="lastUpdate">Waiting for data…</span>
  <a href="/api/v1/audit/log" target="_blank">Audit Log ↗</a>
</div>

<div class="detail-overlay" id="detailOverlay">
  <div class="detail-panel" id="detailPanel">
    <button class="detail-close" onclick="closeDetail()">✕</button>
    <div id="detailContent"></div>
  </div>
</div>

<div class="confirm-overlay" id="confirmOverlay">
  <div class="confirm-box" id="confirmBox"></div>
</div>

<script>
// ── State ─────────────────────────────────────────────────────────
let state = { devices: [] };
let trendData = {};
const TREND_MAX = 600;
let selectedChannel = null;
let lastFeedback = null;

// ── API helpers ───────────────────────────────────────────────────
async function api(method, path, body) {
  const opts = { method, headers: { 'Content-Type': 'application/json' } };
  if (body) opts.body = JSON.stringify(body);
  const resp = await fetch('/api/v1' + path, opts);
  return resp.json();
}

function confirm_(msg) {
  return new Promise(resolve => {
    const box = document.getElementById('confirmBox');
    box.innerHTML = `<p>${msg}</p><div class="btns">
      <button class="maint-btn" onclick="this.closest('.confirm-overlay').classList.remove('open');window._confirmResolve(false)">Cancel</button>
      <button class="maint-btn apply" onclick="this.closest('.confirm-overlay').classList.remove('open');window._confirmResolve(true)">Confirm</button></div>`;
    window._confirmResolve = resolve;
    document.getElementById('confirmOverlay').classList.add('open');
  });
}

// ── Lock management ───────────────────────────────────────────────
async function acquireLock(deviceId) {
  const res = await api('POST', '/lock/acquire', { device_id: deviceId });
  if (!res.ok && res.detail) alert(res.detail);
}
async function releaseLock(deviceId) {
  if (!await confirm_('Release maintenance lock? All pending writes will be discarded.')) return;
  await api('POST', '/lock/release', { device_id: deviceId });
}
async function extendLock(deviceId) {
  await api('POST', '/lock/extend', { device_id: deviceId });
}

// ── Write operations ──────────────────────────────────────────────
async function applySetpoint(deviceId, ch) {
  const input = document.getElementById('sp-input');
  const value = parseFloat(input.value);
  if (isNaN(value)) { showFeedback('err', 'Invalid number'); return; }

  let res = await api('POST', `/devices/${deviceId}/channels/${ch}/setpoint`, { value });
  if (res.requires_confirmation) {
    if (!await confirm_(res.message + '<br>Proceed?')) return;
    res = await api('POST', `/devices/${deviceId}/channels/${ch}/setpoint`, { value, confirmed: true });
  }
  if (res.ok) {
    showFeedback(res.readback_verified ? 'ok' : 'warn',
      `Setpoint → ${res.new_value}°C` + (res.readback_verified ? ' ✓' : ' ⚠ unverified'));
  } else if (res.detail) {
    showFeedback('err', res.detail);
  }
}

async function toggleOutput(deviceId, ch, state) {
  const label = state ? 'Enable output' : 'Disable output';
  if (!await confirm_(`${label} on Channel ${ch}?`)) return;

  let res = await api('POST', `/devices/${deviceId}/channels/${ch}/output`, { state });
  if (res.requires_confirmation) {
    if (!await confirm_(res.message + '<br>Proceed?')) return;
    res = await api('POST', `/devices/${deviceId}/channels/${ch}/output`, { state, confirmed: true });
  }
  if (res.ok) {
    showFeedback('ok', `Output → ${res.new_state ? 'ON' : 'OFF'} ✓`);
  } else if (res.detail) {
    showFeedback('err', res.detail);
  }
}

async function applyLimit(deviceId, ch, type) {
  const input = document.getElementById(type + '-input');
  const value = parseFloat(input.value);
  if (isNaN(value)) { showFeedback('err', 'Invalid number'); return; }

  const res = await api('POST', `/devices/${deviceId}/channels/${ch}/${type}`, { value });
  if (res.ok) {
    showFeedback(res.readback_verified ? 'ok' : 'warn',
      `${type === 'current-limit' ? 'I' : 'V'} limit → ${res.new_value}` + (res.readback_verified ? ' ✓' : ' ⚠'));
  } else if (res.detail) {
    showFeedback('err', res.detail);
  }
}

function showFeedback(cls, msg) {
  lastFeedback = { cls, msg, t: Date.now() };
}

// ── SSE ───────────────────────────────────────────────────────────
function connectSSE() {
  const src = new EventSource('/api/v1/events');
  src.onopen = () => { document.getElementById('globalDot').className = 'connection-dot'; document.getElementById('globalStatus').textContent = 'Connected'; };
  src.onmessage = (e) => { try { const d = JSON.parse(e.data); state = d; updateTrend(d); render(d); } catch(err) { console.error(err); } };
  src.onerror = () => { document.getElementById('globalDot').className = 'connection-dot disconnected'; document.getElementById('globalStatus').textContent = 'Connection lost'; src.close(); setTimeout(connectSSE, 3000); };
}

function updateTrend(data) {
  const now = Date.now();
  for (const dev of data.devices) for (const ch of dev.channels) {
    const k = dev.id + '-' + ch.channel;
    if (!trendData[k]) trendData[k] = [];
    trendData[k].push({ t: now, temp: ch.primary.actual_temp });
    if (trendData[k].length > TREND_MAX) trendData[k] = trendData[k].slice(-TREND_MAX);
  }
}

// ── Render ─────────────────────────────────────────────────────────
function render(data) {
  const clock = document.getElementById('clockDisplay');
  clock.textContent = new Date().toLocaleTimeString('en-GB', { hour12: false });

  // Global connection indicator
  const anyDisc = data.devices.some(d => d.connection_quality === 'disconnected');
  const allOk = data.devices.every(d => d.connection_quality === 'ok');
  const dot = document.getElementById('globalDot');
  dot.className = 'connection-dot' + (anyDisc ? ' disconnected' : (!allOk ? ' degraded' : ''));

  // Lock banner (use first device for now — per-device UI is sufficient for single-device deployments)
  const dev0 = data.devices[0];
  if (dev0) renderLockBanner(dev0);

  // Devices
  let html = '';
  for (const dev of data.devices) {
    const qColor = dev.connection_quality === 'ok' ? 'var(--green)' : dev.connection_quality === 'degraded' ? 'var(--amber)' : 'var(--red)';
    html += `<div class="device-group"><div class="device-header">
      <span class="device-name">${esc(dev.name)}</span>
      <span class="device-meta"><span>${esc(dev.ip)}:${dev.port}</span><span style="color:${qColor}">${dev.connection_quality}</span>
      ${dev.cache_age_ms > 3000 ? `<span class="cache-age-warning visible">${(dev.cache_age_ms/1000).toFixed(0)}s stale</span>` : ''}</span>
    </div><div class="channels-grid">`;
    for (const ch of dev.channels) {
      const p = ch.primary;
      const isDisc = dev.connection_quality === 'disconnected';
      const hasAlarm = p.alarm_summary !== 'NONE';
      let badgeClass = hasAlarm ? 'alarm-active' : (p.output_state ? 'on' : 'off');
      let badgeText = hasAlarm ? p.alarm_summary : (p.output_state ? 'ON' : 'OFF');
      html += `<div class="channel-card${isDisc ? ' disconnected' : ''}${hasAlarm ? ' alarm' : ''}" onclick="openDetail('${dev.id}',${ch.channel})">
        <div class="ch-label"><span>CH ${ch.channel}</span><span class="ch-output-badge ${badgeClass}"><span class="dot"></span>${badgeText}</span></div>
        <div class="ch-temp">${p.output_state ? p.actual_temp.toFixed(2) : '—'}<span class="unit">°C</span></div>
        <div class="ch-setpoint">set ${p.setpoint.toFixed(1)}°C</div>
        <dl class="ch-readings"><dt>I</dt><dd>${p.output_state ? p.current.toFixed(2)+' A' : '—'}</dd><dt>V</dt><dd>${p.output_state ? p.voltage.toFixed(2)+' V' : '—'}</dd></dl>
      </div>`;
    }
    html += '</div></div>';
  }
  document.getElementById('devicesContainer').innerHTML = html;
  document.getElementById('lastUpdate').textContent = 'Last update: ' + new Date().toLocaleTimeString('en-GB', { hour12: false });

  if (selectedChannel) renderDetail(selectedChannel.deviceId, selectedChannel.ch);
}

function renderLockBanner(dev) {
  const banner = document.getElementById('lockBanner');
  const text = document.getElementById('lockText');
  const warn = document.getElementById('advisoryWarn');
  const actions = document.getElementById('lockActions');

  if (dev.lock_state === 'MAINT_LOCKED') {
    banner.className = 'lock-banner locked';
    const mins = dev.lock_remaining_s != null ? Math.ceil(dev.lock_remaining_s / 60) : '?';
    text.textContent = `◆ MAINTENANCE — ${dev.lock_holder} (${mins} min left)`;
    warn.style.display = 'inline';
    actions.innerHTML = `<button class="lock-btn extend" onclick="extendLock('${dev.id}')">Extend</button>
      <button class="lock-btn release" onclick="releaseLock('${dev.id}')">Release</button>`;
  } else {
    banner.className = 'lock-banner daq';
    text.textContent = '◇ Lock: DAQ owns — gateway is read-only';
    warn.style.display = 'none';
    actions.innerHTML = `<button class="lock-btn acquire" onclick="acquireLock('${dev.id}')">Request Maintenance Access</button>`;
  }
}

// ── Detail panel ──────────────────────────────────────────────────
function openDetail(deviceId, ch) {
  selectedChannel = { deviceId, ch };
  document.getElementById('detailOverlay').classList.add('open');
  renderDetail(deviceId, ch);
}
function closeDetail() { selectedChannel = null; document.getElementById('detailOverlay').classList.remove('open'); }
document.getElementById('detailOverlay').addEventListener('click', e => { if (e.target === e.currentTarget) closeDetail(); });
document.addEventListener('keydown', e => { if (e.key === 'Escape') { closeDetail(); document.getElementById('confirmOverlay').classList.remove('open'); } });

function renderDetail(deviceId, ch) {
  const dev = state.devices?.find(d => d.id === deviceId);
  if (!dev) return;
  const chData = dev.channels?.find(c => c.channel === ch);
  if (!chData) return;
  const p = chData.primary, d = chData.diagnostic, sl = chData.software_limits;
  const isLocked = dev.lock_state === 'MAINT_LOCKED';

  // Feedback area
  let fbHtml = '';
  if (lastFeedback && Date.now() - lastFeedback.t < 8000) {
    fbHtml = `<div class="maint-feedback ${lastFeedback.cls}">${lastFeedback.msg}</div>`;
  }

  let html = `<div class="detail-title">${esc(dev.name)} — Channel ${ch}</div>
    <div class="detail-section"><div class="detail-section-title">Primary</div>
      <div class="detail-row"><span class="label">Actual temperature</span><span class="value">${p.actual_temp.toFixed(2)} °C</span></div>
      <div class="detail-row"><span class="label">Setpoint</span><span class="value">${p.setpoint.toFixed(2)} °C</span></div>
      <div class="detail-row"><span class="label">Output current</span><span class="value">${p.current.toFixed(2)} A</span></div>
      <div class="detail-row"><span class="label">TEC voltage</span><span class="value">${p.voltage.toFixed(2)} V</span></div>
      <div class="detail-row"><span class="label">Output</span><span class="value">${p.output_state ? 'ON' : 'OFF'}</span></div>
      <div class="detail-row"><span class="label">Alarm</span><span class="value" style="color:${p.alarm_summary !== 'NONE' ? 'var(--red)' : 'var(--green)'}">${p.alarm_summary}</span></div>
    </div>
    <div class="trend-container"><span class="trend-label">Temperature — last ${getTrendDur(deviceId,ch)}</span><canvas class="trend-canvas" id="trendCanvas"></canvas></div>
    <div class="detail-section"><div class="detail-section-title">Diagnostics (Tier 1b)</div>
      <div class="detail-row"><span class="label">Current limit</span><span class="value">${d.current_limit.toFixed(2)} A</span></div>
      <div class="detail-row"><span class="label">Voltage limit</span><span class="value">${d.voltage_limit.toFixed(2)} V</span></div>
      ${sl.temp_min!=null ? `<div class="detail-row"><span class="label">Temp window</span><span class="value">${sl.temp_min}–${sl.temp_max} °C</span></div>` : ''}
      <div class="detail-row"><span class="label">Sensor raw</span><span class="value">${d.sensor_raw}</span></div>
      <div class="detail-row"><span class="label">Control mode</span><span class="value">${d.control_mode}</span></div>
      <div class="detail-row"><span class="label">Fan</span><span class="value">${d.fan_state ? 'ON' : 'OFF'}</span></div>
    </div>
    <div class="maint-section${isLocked ? '' : ' hidden'}">
      <div class="maint-section-title">Maintenance Controls</div>
      <div class="maint-row">
        <label>Setpoint</label>
        <input class="maint-input" id="sp-input" type="number" step="0.1" value="${p.setpoint.toFixed(1)}" ${sl.temp_min!=null ? `min="${sl.temp_min}" max="${sl.temp_max}"` : ''}>
        <span class="maint-unit">°C</span>
        <button class="maint-btn apply" onclick="applySetpoint('${deviceId}',${ch})">Apply</button>
      </div>
      <div class="maint-row">
        <label>Output</label>
        <button class="maint-btn on" onclick="toggleOutput('${deviceId}',${ch},true)" ${p.output_state ? 'disabled' : ''}>Enable</button>
        <button class="maint-btn off" onclick="toggleOutput('${deviceId}',${ch},false)" ${!p.output_state ? 'disabled' : ''}>Disable</button>
      </div>
      <div class="maint-row">
        <label>I limit</label>
        <input class="maint-input" id="current-limit-input" type="number" step="0.1" value="${d.current_limit.toFixed(1)}" ${sl.current_max!=null ? `max="${sl.current_max}"` : ''} min="0">
        <span class="maint-unit">A</span>
        <button class="maint-btn apply" onclick="applyLimit('${deviceId}',${ch},'current-limit')">Apply</button>
      </div>
      <div class="maint-row">
        <label>V limit</label>
        <input class="maint-input" id="voltage-limit-input" type="number" step="0.1" value="${d.voltage_limit.toFixed(1)}" ${sl.voltage_max!=null ? `max="${sl.voltage_max}"` : ''} min="0">
        <span class="maint-unit">V</span>
        <button class="maint-btn apply" onclick="applyLimit('${deviceId}',${ch},'voltage-limit')">Apply</button>
      </div>
      ${fbHtml}
    </div>
    ${!isLocked ? '<div style="margin-top:16px;font-size:12px;color:var(--text-dim);font-style:italic">Maintenance controls available when lock is held.</div>' : ''}`;

  document.getElementById('detailContent').innerHTML = html;
  requestAnimationFrame(() => drawTrend(deviceId, ch));
}

function getTrendDur(deviceId, ch) {
  const pts = trendData[deviceId+'-'+ch] || [];
  if (pts.length < 2) return '—';
  const s = (pts[pts.length-1].t - pts[0].t) / 1000;
  return s < 60 ? s.toFixed(0)+'s' : (s/60).toFixed(1)+' min';
}

function drawTrend(deviceId, ch) {
  const canvas = document.getElementById('trendCanvas');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const rect = canvas.parentElement.getBoundingClientRect();
  canvas.width = rect.width - 24; canvas.height = rect.height - 24;
  const W = canvas.width, H = canvas.height;
  const pts = trendData[deviceId+'-'+ch] || [];
  ctx.clearRect(0, 0, W, H);
  if (pts.length < 2) { ctx.fillStyle = '#555d6b'; ctx.font = '11px Menlo, Consolas, monospace'; ctx.textAlign = 'center'; ctx.fillText('Accumulating data…', W/2, H/2); return; }
  let mn = Infinity, mx = -Infinity;
  for (const p of pts) { if (p.temp < mn) mn = p.temp; if (p.temp > mx) mx = p.temp; }
  const rng = mx - mn, pad = rng < 0.1 ? 0.5 : rng * 0.2;
  mn -= pad; mx += pad;
  const t0 = pts[0].t, t1 = pts[pts.length-1].t, tR = t1-t0||1;
  ctx.strokeStyle = '#1e2228'; ctx.lineWidth = 1;
  for (let i = 0; i <= 4; i++) { const y = Math.round((i/4)*H)+0.5; ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke(); }
  ctx.beginPath(); ctx.strokeStyle = '#3b82f6'; ctx.lineWidth = 1.5; ctx.lineJoin = 'round';
  for (let i = 0; i < pts.length; i++) { const x = ((pts[i].t-t0)/tR)*W, y = H-((pts[i].temp-mn)/(mx-mn))*H; i===0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y); }
  ctx.stroke();
  const dev = state.devices?.find(d => d.id === deviceId);
  const chD = dev?.channels?.find(c => c.channel === ch);
  if (chD) { const sp = chD.primary.setpoint, spY = H-((sp-mn)/(mx-mn))*H; if (spY > 0 && spY < H) { ctx.beginPath(); ctx.setLineDash([4,4]); ctx.strokeStyle = '#22c55e44'; ctx.lineWidth = 1; ctx.moveTo(0,spY); ctx.lineTo(W,spY); ctx.stroke(); ctx.setLineDash([]); } }
  ctx.fillStyle = '#555d6b'; ctx.font = '10px Menlo, Consolas, monospace'; ctx.textAlign = 'right';
  ctx.fillText(mx.toFixed(2), W-2, 10); ctx.fillText(mn.toFixed(2), W-2, H-2);
}

function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

connectSSE();
</script>
</body>
</html>
