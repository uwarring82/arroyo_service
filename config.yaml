#      ch4: { temp_min: 15.0, temp_max: 30.0, current_max: 2.0, voltage_max: 8.0 }

auth:
  token_expiry_hours: 4
  max_failed_logins: 5
  # Phase 2: config-based role bypass (no login required).
  # Remove or set to null when real auth is implemented in Phase 3.
  default_user: "technician"
  default_role: "technician"        # "viewer" | "technician" | "admin"

daq_integration:
  mode: "manual"          # "manual" | "flag_file" | "api"
  flag_file_path: null
  api_url: null
